<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Details | CodeBase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #4f46e5;
            --accent-secondary: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: visible; /* Allow logo to overflow */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.98) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .hero {
            height: 240px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 40px;
            overflow: hidden;
            border-top-left-radius: 31px; /* Match container */
            border-top-right-radius: 31px;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .org-logo-wrap {
            width: 140px;
            height: 140px;
            background: #ffffff;
            border-radius: 28px;
            position: absolute;
            top: 170px; /* Positioned relative to container top */
            left: 40px;
            padding: 12px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border: 4px solid #1e293b;
        }

        .org-logo-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .content {
            padding: 100px 40px 60px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .org-category {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .org-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-main);
            line-height: 1.1;
        }

        .org-description {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-muted);
            margin: 24px 0 32px;
            font-weight: 400;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--accent-primary), #818cf8);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .social-links {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-icon:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            transform: translateY(-3px);
            color: white;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
        }

        .info-item h5 {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .info-item p {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .edit-fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 64px;
            height: 64px;
            background: var(--accent-primary);
            color: white;
            border-radius: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .edit-fab:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Editor Overlay */
        .editor-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .editor-card {
            background: #1e293b;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 100;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--accent-primary);
            transform: translateX(-5px);
        }

        @media (max-width: 640px) {
            .org-name { font-size: 2rem; }
            .content { padding: 80px 24px 40px; }
            .org-logo-wrap { width: 110px; height: 110px; left: 24px; top: 185px; }
            .btn { width: 100%; }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.875rem; font-weight: 600; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); border-radius: 12px; color: white;
        }
    </style>
</head>

<body>

    <a href="dashboard.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Dashboard
    </a>

    <div class="container">
        <div class="hero" id="orgHero"></div>
        <div class="org-logo-wrap">
            <img id="orgLogo" src="" alt="Org Logo">
        </div>
        <div class="content">
            <div id="mainLoading" style="position: absolute; inset: 0; background: #0f172a; z-index: 50; display: flex; align-items: center; justify-content: center; border-radius: 32px; transition: opacity 0.4s ease;">
                <div style="width: 32px; height: 32px; border: 3px solid rgba(79, 70, 229, 0.1); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            </div>

            <div class="header-row">
                <div>
                    <p class="org-category" id="orgCategory">Loading...</p>
                    <h1 class="org-name" id="orgName">---</h1>
                </div>
                <div class="action-bar">
                    <button class="btn btn-primary" id="joinBtn">Join Now</button>
                </div>
            </div>
            
            <p class="org-description" id="orgDesc">Loading organization details...</p>

            <div class="social-links" id="socialLinks"></div>

            <div class="info-grid">
                <div class="info-item">
                    <h5>Website</h5>
                    <p id="orgWebsite">---</p>
                </div>
                <div class="info-item">
                    <h5>Contact Email</h5>
                    <p id="orgEmail">---</p>
                </div>
            </div>
        </div>
    </div>

    <div class="edit-fab" id="editBtn" onclick="toggleEditor()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path>
        </svg>
    </div>

    <div class="editor-overlay" id="editorOverlay">
        <div class="editor-card">
            <h3>Edit Organization</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="editDescription" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="editCategory"
                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:12px; color:white;">
                    <option value="Faculty">Faculty</option>
                    <option value="University">University</option>
                    <option value="National">National</option>
                    <option value="International">International</option>
                    <option value="Sports">Sports</option>
                    <option value="Religious">Religious</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Facebook Link</label>
                    <input type="text" id="editFb">
                </div>
                <div class="form-group">
                    <label>YouTube Link</label>
                    <input type="text" id="editYt">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" id="editWebsite">
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" id="editContactEmail">
                </div>
            </div>
            <div class="form-group">
                <label>Theme Color</label>
                <input type="color" id="editColor" style="height: 50px;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="saveChanges()">Save Changes</button>
                <button class="btn btn-outline" onclick="toggleEditor()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { app } from "./assets/js/firebase.js";

        const db = getFirestore(app);
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const orgId = urlParams.get("id");

        if (!orgId) window.location.href = "dashboard.html";

        let currentOrgData = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            const userSnap = await getDoc(doc(db, "users", user.uid));
            const userData = userSnap.data();

            await loadOrgDetails();
            checkPermissions(userData);
        });

        async function loadOrgDetails() {
            const snap = await getDoc(doc(db, "organizations", orgId));
            if (!snap.exists()) { window.location.href = "dashboard.html"; return; }

            const data = snap.data();
            currentOrgData = data;

            document.getElementById("orgName").textContent = data.name;
            document.getElementById("orgDesc").textContent = data.description || "No description available.";
            document.getElementById("orgCategory").textContent = data.category || "University Organization";
            document.getElementById("orgLogo").src = data.icon || "";
            document.getElementById("orgHero").style.background = `linear-gradient(135deg, ${data.color || '#4f46e5'}, var(--accent-secondary))`;

            document.getElementById("editName").value = data.name;
            document.getElementById("editDescription").value = data.description || "";
            document.getElementById("editCategory").value = data.category || "University";
            document.getElementById("editColor").value = data.color || "#4f46e5";
            document.getElementById("editFb").value = data.fb || "";
            document.getElementById("editYt").value = data.yt || "";
            document.getElementById("editWebsite").value = data.website || "";
            document.getElementById("editContactEmail").value = data.contactEmail || "";

            // Dynamic Social Icons
            const socialHost = document.getElementById("socialLinks");
            socialHost.innerHTML = "";
            if (data.fb) socialHost.innerHTML += `<a href="${data.fb}" target="_blank" class="social-icon" title="Facebook"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg></a>`;
            if (data.yt) socialHost.innerHTML += `<a href="${data.yt}" target="_blank" class="social-icon" title="YouTube"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-1.94C18.88 4 12 4 12 4s-6.88 0-8.6.48a2.78 2.78 0 0 0-1.94 1.94C1 8.14 1 12 1 12s0 3.86.48 5.58a2.78 2.78 0 0 0 1.94 1.94c1.72.48 8.6.48 8.6.48s6.88 0 8.6-.48a2.78 2.78 0 0 0 1.94-1.94C23 15.86 23 12 23 12s0-3.86-.48-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg></a>`;
            if (data.website) socialHost.innerHTML += `<a href="${data.website}" target="_blank" class="social-icon" title="Website"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></a>`;

            document.getElementById("orgWebsite").innerHTML = data.website ? `<a href="${data.website}" target="_blank" style="color:var(--accent-primary); text-decoration:none;">${data.website.replace(/^https?:\/\//, '')}</a>` : "N/A";
            document.getElementById("orgEmail").textContent = data.contactEmail || "N/A";

            // Update Join Btn
            const joinBtn = document.getElementById("joinBtn");
            if (data.joinLink) {
                joinBtn.onclick = () => window.open(data.joinLink, "_blank");
            } else {
                const joined = JSON.parse(localStorage.getItem("joinedOrgs") || "[]");
                joinBtn.textContent = joined.includes(orgId) ? "Leave Organization" : "Join Now";
                joinBtn.classList.toggle("btn-outline", joined.includes(orgId));
                joinBtn.onclick = () => toggleJoin(joinBtn);
            }

            // Final polished exit for loading
            const loader = document.getElementById("mainLoading");
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 400);
        }

        async function checkPermissions(userData) {
            if (userData.role === "owner") {
                document.getElementById("editBtn").style.display = "flex";
                return;
            }

            if (["admin", "editor"].includes(userData.role)) {
                const roleSnap = await getDoc(doc(db, "roles", userData.customRoleId || "none"));
                if (roleSnap.exists()) {
                    const perms = roleSnap.data().permissions;
                    const canEdit = perms.canManageOrgs &&
                        ((perms.allowedOrgs || []).length === 0 || perms.allowedOrgs.includes(orgId));
                    if (canEdit) {
                        document.getElementById("editBtn").style.display = "flex";
                    }
                }
            }
        }

        window.toggleEditor = () => {
            const overlay = document.getElementById("editorOverlay");
            overlay.style.display = overlay.style.display === "flex" ? "none" : "flex";
        };

        window.saveChanges = async () => {
            const updates = {
                name: document.getElementById("editName").value,
                description: document.getElementById("editDescription").value,
                category: document.getElementById("editCategory").value,
                color: document.getElementById("editColor").value,
                fb: document.getElementById("editFb").value,
                yt: document.getElementById("editYt").value,
                website: document.getElementById("editWebsite").value,
                contactEmail: document.getElementById("editContactEmail").value
            };

            await updateDoc(doc(db, "organizations", orgId), updates);
            toggleEditor();
            loadOrgDetails();
        };

        function toggleJoin(btn) {
            let joined = JSON.parse(localStorage.getItem("joinedOrgs") || "[]");
            if (joined.includes(orgId)) {
                joined = joined.filter(id => id !== orgId);
                btn.textContent = "Join Now";
                btn.classList.remove("btn-outline");
            } else {
                joined.push(orgId);
                btn.textContent = "Leave Organization";
                btn.classList.add("btn-outline");
            }
            localStorage.setItem("joinedOrgs", JSON.stringify(joined));
        }
    </script>
</body>

</html>
