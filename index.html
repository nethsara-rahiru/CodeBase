<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading | CodeBase</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #020617;
      --accent-primary: #6366f1;
      --accent-secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.07);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Elements */
    .bg-elements {
      position: absolute;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Mouse Spotlight Effect */
    #spotlight {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(99, 102, 241, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      z-index: 0;
      filter: blur(40px);
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0) 70%);
      border-radius: 50%;
      filter: blur(80px);
      animation: float 25s infinite alternate ease-in-out;
    }

    .blob-1 { top: -150px; left: -150px; animation-delay: 0s; }
    .blob-2 { bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(236, 72, 153, 0) 70%); animation-delay: -7s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1.1); }
      33% { transform: translate(40px, 60px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1.1); }
    }

    .container {
      text-align: center;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-title {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.04em;
      filter: drop-shadow(0px 10px 40px rgba(0,0,0,0.4));
      animation: shimmer 5s linear infinite, breathe 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      width: 320px;
    }

    /* Modern Progress Track */
    .progress-container {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      animation: progressMove 2.2s infinite cubic-bezier(0.65, 0, 0.35, 1);
      box-shadow: 0 0 20px var(--accent-primary);
    }

    @keyframes progressMove {
      0% { left: -40%; width: 20%; }
      50% { width: 50%; }
      100% { left: 100%; width: 20%; }
    }

    .status-text {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--accent-primary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1.25em;
      transition: opacity 0.5s ease-in-out;
    }

    /* Interesting Content: Tips */
    .tip-container {
      margin-top: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
      width: 100%;
    }

    .tip-label {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }

    .tip-text {
      font-size: 0.8rem;
      color: var(--text-main);
      opacity: 0.8;
      line-height: 1.4;
      font-weight: 400;
      transition: opacity 0.4s ease-in-out;
    }

    /* Subtle Scanline Overlay */
    .scanline {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.3;
    }

    @media (max-width: 480px) {
      .brand-title { font-size: 2.5rem; }
      .loader-wrap { width: 280px; }
    }
  </style>
</head>

<body>
  <div id="spotlight"></div>
  
  <div class="bg-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="scanline"></div>

  <main class="container">
    <h1 class="brand-title">CodeBase</h1>

    <div class="loader-wrap">
      <div id="loadingText" class="status-text">INITIALIZING...</div>
      
      <div class="progress-container">
        <div class="progress-fill"></div>
      </div>

      <div class="tip-container">
        <div class="tip-label">Did you know?</div>
        <div id="tipText" class="tip-text">Loading insights...</div>
      </div>
    </div>
  </main>

  <script type="module">
    import { app } from "./assets/js/firebase.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

    const auth = getAuth(app);
    const loadingText = document.getElementById('loadingText');
    const tipText = document.getElementById('tipText');
    const spotlight = document.getElementById('spotlight');

    // Mouse interactive spotlight
    document.addEventListener('mousemove', (e) => {
      spotlight.style.left = e.clientX + 'px';
      spotlight.style.top = e.clientY + 'px';
    });

    // Content: Daily Tips
    const tips = [
      "You can track your GPA progression directly from the dashboard.",
      "Organizations are a great way to meet like-minded students.",
      "Check the 'Resources' tab for official university past papers.",
      "Your dashboard is personalized based on your level and semester.",
      "Join as many organizations as you like to expand your horizon.",
      "Always use your official student email for a secure experience."
    ];

    // Status messages for cross-fade effect
    const statusMessages = [
      "AUTHENTICATING...",
      "FETCHING_WORKSPACE...",
      "SYNCING_DATABASE...",
      "FINALIZING_UI...",
      "READY_FOR_LAUNCH"
    ];

    let msgIdx = 0;
    let tipIdx = 0;

    const cycleContent = () => {
      // Fade out both status and tip
      loadingText.style.opacity = 0;
      tipText.style.opacity = 0;

      setTimeout(() => {
        // Rotate status messages
        msgIdx = (msgIdx + 1) % statusMessages.length;
        loadingText.textContent = statusMessages[msgIdx];
        
        // Rotate tips
        tipIdx = (tipIdx + 1) % tips.length;
        tipText.textContent = tips[tipIdx];

        // Fade in
        loadingText.style.opacity = 1;
        tipText.style.opacity = 0.8;
      }, 500); // Wait for fade-out to complete
    };

    // Initialize display
    const initialTip = tips[Math.floor(Math.random() * tips.length)];
    tipText.textContent = initialTip;
    loadingText.textContent = statusMessages[0];
    
    // Slight delay to ensure the initial fade-in isn't missed
    setTimeout(() => {
      loadingText.style.opacity = 1;
      tipText.style.opacity = 0.8;
    }, 100);

    const msgTimer = setInterval(cycleContent, 3500);

    // -------------------------------------------------
    // Auth State Monitor
    // -------------------------------------------------
    onAuthStateChanged(auth, (user) => {
      setTimeout(() => {
        clearInterval(msgTimer);
        // Final fade out before redirect
        document.querySelector('.container').style.opacity = 0;
        document.querySelector('.container').style.transition = 'opacity 0.8s ease-in-out';
        
        setTimeout(() => {
          if (user) {
            window.location.href = "dashboard.html";
          } else {
            const hasLegacySession = localStorage.getItem("appCode") === "App" && 
                                     localStorage.getItem("uid");
            
            if (hasLegacySession) {
              setTimeout(() => {
                 if (!auth.currentUser) window.location.href = "login.html";
                 else window.location.href = "dashboard.html";
              }, 1000);
            } else {
              window.location.href = "login.html";
            }
          }
        }, 800);
      }, 3000);
    });

    setTimeout(() => {
      const path = window.location.pathname;
      if (path.includes("index.html") || path === "/" || path.endsWith("/")) {
        window.location.href = "login.html";
      }
    }, 15000);
  </script>
</body>
</html>
