<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Profile | CodeBase</title>

  <!-- Google Fonts: Inter & Poppins -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-primary: #4f46e5;
      --accent-secondary: #818cf8;
      --accent-success: #10b981;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.1) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-bottom: 32px;
        backdrop-filter: blur(20px);
        width: fit-content;
    }
    .back-btn:hover {
        background: rgba(255,255,255,0.08);
        transform: translateX(-5px);
        border-color: var(--accent-primary);
    }

    /* Premium profile header nextgen */
    .profile-header-nextgen {
        position: relative;
        background: var(--glass-bg);
        border-radius: 40px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        margin-bottom: 40px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        backdrop-filter: blur(20px);
    }
    .cover-photo {
        height: 300px;
        background: linear-gradient(135deg, #4338ca 0%, #6366f1 50%, #818cf8 100%);
        position: relative;
        overflow: hidden;
    }
    .cover-photo::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 40%, rgba(15, 23, 42, 0.7));
    }
    .profile-info-row {
        padding: 0 48px 48px;
        display: flex;
        align-items: flex-end;
        gap: 32px;
        margin-top: -90px;
        position: relative;
        z-index: 2;
    }
    .profile-pic-container {
        position: relative;
        width: 190px;
        height: 190px;
        border-radius: 52px;
        border: 10px solid var(--bg-dark);
        overflow: hidden;
        background: #1e293b;
        box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .profile-pic-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .profile-text {
        flex: 1;
        padding-bottom: 24px;
    }
    .profile-text h1 {
        font-size: 2.8rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 0;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1.1;
    }
    .profile-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--text-muted);
        font-weight: 600;
        margin-top: 14px;
        font-size: 1.05rem;
    }
    .profile-meta .dot {
        width: 5px;
        height: 5px;
        background: var(--accent-primary);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--accent-primary);
    }

    .org-section {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 32px;
        margin-bottom: 32px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }
    .stat-card {
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 24px;
        text-align: center;
    }
    .stat-card .val {
        display: block;
        font-size: 2rem;
        font-weight: 800;
        color: var(--accent-secondary);
        margin-bottom: 4px;
    }
    .stat-card .label {
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.05em;
    }

    .org-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    .org-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        transition: 0.3s;
    }

    .badge-premium {
        padding: 6px 16px;
        background: rgba(79, 70, 229, 0.1);
        border: 1px solid var(--accent-primary);
        border-radius: 100px;
        color: var(--accent-secondary);
        font-weight: 800;
        font-size: 0.85rem;
    }

    @media (max-width: 768px) {
        .profile-info-row {
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: -80px;
            padding: 0 24px 32px;
        }
        .profile-pic-container { width: 150px; height: 150px; border-radius: 40px; }
        .profile-text h1 { font-size: 2.2rem; }
        .profile-meta { justify-content: center; font-size: 0.9rem; flex-wrap: wrap; }
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="dashboard.html" class="back-btn">
       <i class="fas fa-arrow-left"></i> Back to Members
    </a>

    <!-- Profile Header -->
    <div class="profile-header-nextgen">
        <div class="cover-photo" id="profileCover"></div>
        <div class="profile-info-row">
            <div class="profile-pic-container">
                <img id="profileTabPic" src="https://ui-avatars.com/api/?name=User" alt="Profile">
            </div>
            <div class="profile-text">
                <h1 id="profileTabName">Loading Profile...</h1>
                <div class="profile-meta">
                    <span id="profileTabUni">Verifying Institution</span>
                    <div class="dot"></div>
                    <span id="profileTabStream">Curriculum Path</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" style="margin-bottom: 32px;">
        <div class="stat-card"><span class="val" id="userPoints">0</span><span class="label">XP Points</span></div>
        <div class="stat-card"><span class="val" id="statCourses">0</span><span class="label">Learning Tracks</span></div>
        <div class="stat-card"><span class="val" id="statContributions">0</span><span class="label">Contributions</span></div>
    </div>

    <!-- Organizations -->
    <section class="org-section">
      <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 24px;">Institutional Roles</h3>
      <div id="joinedOrgsList" class="org-grid">
        <p style="color: var(--text-muted); font-size: 0.9rem;">No active roles found.</p>
      </div>
    </section>

    <!-- Contributions -->
    <section class="org-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3 style="font-size: 1.25rem; font-weight: 700;">Community Impact</h3>
        <span class="badge-premium" id="contributionCount">0 UPLOADS</span>
      </div>
      <div id="userContributionsList" class="org-grid">
        <p style="color: var(--text-muted); font-size: 0.9rem;">This member hasn't shared any resources yet.</p>
      </div>
    </section>

  </div>

  <script type="module">
    import { db, auth } from "./assets/js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { collection, doc, getDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const targetUid = params.get("uid");

    if (!targetUid) {
        window.location.href = "dashboard.html";
    }

    onAuthStateChanged(auth, user => {
        if (!user) {
            window.location.href = "index.html"; 
            return;
        }
        loadPublicProfile();
    });

    async function loadPublicProfile() {
        try {
            const userSnap = await getDoc(doc(db, "users", targetUid));
            if (!userSnap.exists()) {
                document.getElementById("profileTabName").textContent = "Member Not Found";
                return;
            }

            const data = userSnap.data();
            const regNo = data.registrationNumber;
            
            // Standard Details
            document.getElementById("profileTabName").textContent = data.name || "Anonymous Member";
            document.getElementById("profileTabPic").src = data.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=4f46e5&color=fff`;
            if(data.coverUrl) document.getElementById("profileCover").style.background = `url('${data.coverUrl}') center/cover no-repeat`;

            // Meta Info
            document.getElementById("profileTabUni").textContent = data.universityName || data.uniId || "External Member";
            document.getElementById("profileTabStream").textContent = data.streamName || data.stream || "General Track";
            document.getElementById("userPoints").textContent = data.points || 0;
            document.getElementById("statCourses").textContent = data.enrolledCourses?.length || 0;

            renderContributions(regNo);
            renderOrgs(targetUid);

        } catch (err) {
            console.error("Profile Load Error:", err);
            document.getElementById("profileTabName").textContent = "Error Loading Details";
        }
    }

    async function renderContributions(regNo) {
        const list = document.getElementById("userContributionsList");
        const countBadge = document.getElementById("contributionCount");

        try {
            const snap = await getDocs(collection(db, "community_resources"));
            const allHits = snap.docs
                .map(d => ({ ...d.data(), id: d.id }))
                .filter(d => {
                    const isOwner = (regNo && (d.uploadedBy === regNo || d.ownerReg === regNo)) || (d.uploadedByUid === targetUid);
                    return isOwner && !d.isHidden;
                })
                .sort((a,b) => {
                    const dateA = a.uploadedAt?.toDate() || a.updatedAt?.toDate() || 0;
                    const dateB = b.uploadedAt?.toDate() || b.updatedAt?.toDate() || 0;
                    return dateB - dateA;
                });

            if (allHits.length > 0) {
                list.innerHTML = "";
                allHits.forEach(item => {
                    const isBlog = item.type === 'blog' || item.type === 'article';
                    const icon = isBlog ? 'fa-feather-alt' : (item.type === 'pdf' ? 'fa-file-pdf' : 'fa-link');
                    const color = isBlog ? '#ec4899' : '#6366f1';

                    const card = document.createElement("div");
                    card.className = "org-item";
                    card.style.cursor = "pointer";
                    card.innerHTML = `
                        <div style="width: 44px; height: 44px; border-radius: 12px; background: ${color}20; color: ${color}; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div style="flex: 1;">
                            <h4 style="margin: 0; font-size: 0.9rem; color: #fff;">${item.title}</h4>
                            <p style="margin: 3px 0 0; font-size: 0.7rem; color: var(--text-muted); font-weight: 600;">${item.type?.toUpperCase() || 'CONTRIBUTION'}</p>
                        </div>
                    `;
                    card.onclick = () => {
                        if(isBlog) window.location.href = `blog.html?id=${item.id}`;
                        else {
                            if (item.type === 'pdf') {
                                const m = item.link?.match(/\/file\/d\/([a-zA-Z0-9_-]+)\/|[?&]id=([a-zA-Z0-9_-]+)/);
                                const fileId = m ? (m[1] || m[2]) : null;
                                if (fileId) { window.location.href = `reader.html?id=${fileId}`; return; }
                            }
                            window.open(item.link || item.url, '_blank');
                        }
                    };
                    list.appendChild(card);
                });
                countBadge.textContent = `${allHits.length} CONTRIBUTIONS`;
                document.getElementById("statContributions").textContent = allHits.length;
            }
        } catch (e) { console.error("Impact Load Error:", e); }
    }

    async function renderOrgs(uid) {
        const list = document.getElementById("joinedOrgsList");
        try {
            const snap = await getDocs(collection(db, "organizations"));
            let found = false;
            list.innerHTML = "";
            snap.forEach(d => {
                const org = d.data();
                const myRole = org.members?.find(m => m.uid === uid);
                if (myRole) {
                    found = true;
                    const div = document.createElement("div");
                    div.className = "org-item";
                    div.innerHTML = `
                        <div style="width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.05); overflow: hidden;">
                            <img src="${org.logo || 'assets/img/default-org.png'}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div style="flex:1;">
                            <h4 style="margin:0; font-size:0.9rem;">${org.name}</h4>
                            <p style="margin:3px 0 0; font-size:0.7rem; color:var(--accent-secondary); font-weight:700;">${myRole.role.toUpperCase()}</p>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
            if(!found) list.innerHTML = "<p style='color:var(--text-muted); font-size:0.8rem;'>No active roles.</p>";
        } catch(e) {}
    }

    loadPublicProfile();
  </script>
</body>
</html>
